<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nginx Load Balancer Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --blue-light: #eff6ff;
    --ink: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(circle at 15% 10%, #eff6ff 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #f0f9ff 0%, transparent 45%),
      #ffffff;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06);
    padding: 0;
    max-width: 460px;
    width: 100%;
    overflow: hidden;
    animation: rise 0.4s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .accent-bar {
    height: 5px;
    background: linear-gradient(90deg, var(--instance-color), var(--instance-color-2));
  }

  .content { padding: 36px 36px 28px; }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: #16a34a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45); }
    70% { box-shadow: 0 0 0 7px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }

  .instance-panel {
    background: var(--blue-light);
    border: 1px solid #bfdbfe;
    border-radius: 12px;
    padding: 22px;
    text-align: center;
    margin-bottom: 22px;
    position: relative;
  }

  .instance-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--instance-color);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .instance-name {
    font-size: 34px;
    font-weight: 800;
    color: var(--instance-color);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .instance-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 22px;
  }

  .stat {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat .num {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .stat .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  button {
    flex: 1;
    border: none;
    border-radius: 9px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-primary {
    background: var(--blue);
    color: #ffffff;
  }
  .btn-primary:hover { background: var(--blue-dark); }

  .btn-secondary {
    background: #ffffff;
    color: var(--blue);
    border: 1px solid #bfdbfe;
  }
  .btn-secondary:hover { background: var(--blue-light); }
  .btn-secondary.active {
    background: var(--blue);
    color: #ffffff;
  }

  details {
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  summary {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  summary::-webkit-details-marker { display: none; }
  summary:before {
    content: "▸";
    font-size: 10px;
    transition: transform 0.15s ease;
  }
  details[open] summary:before { transform: rotate(90deg); }

  .tech-details {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    font-family: "SF Mono", Monaco, monospace;
    word-break: break-all;
  }
  .tech-details b { color: var(--ink); font-weight: 600; }

  .countdown {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    min-height: 14px;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="accent-bar"></div>
    <div class="content">
      <div class="top-row">
        <h1>Load Balancer Demo</h1>
        <div class="live-badge"><span class="live-dot"></span>Live</div>
      </div>

      <div class="instance-panel">
        <div class="instance-label">Request served by</div>
        <div class="instance-name">{{ instance_name }}</div>
        <div class="instance-sub">via Nginx round-robin</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="num">{{ request_count }}</div>
          <div class="label">Requests handled</div>
        </div>
        <div class="stat">
          <div class="num">{{ uptime_seconds }}s</div>
          <div class="label">Instance uptime</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="window.location.reload()">Refresh &amp; Reroute</button>
        <button class="btn-secondary" id="autoBtn" onclick="toggleAuto()">Auto</button>
      </div>
      <div class="countdown" id="countdown"></div>

      <details>
        <summary>Technical details</summary>
        <div class="tech-details">
          <div><b>Container ID:</b> {{ container_id }}</div>
          <div><b>Last served:</b> {{ timestamp }}</div>
        </div>
      </details>
    </div>
  </div>

  <script>
    // Color-code each instance so it's visually obvious which one
    // answered the request, without touching the Flask/Nginx layer.
    const colors = {
      app1: ["#2563eb", "#60a5fa"],
      app2: ["#7c3aed", "#a78bfa"],
      app3: ["#0d9488", "#5eead4"]
    };
    const instance = "{{ instance_name }}";
    const [c1, c2] = colors[instance] || colors.app1;
    document.documentElement.style.setProperty("--instance-color", c1);
    document.documentElement.style.setProperty("--instance-color-2", c2);

    // Optional auto-refresh so you can film the container rotation
    // without clicking manually.
    let autoInterval = null;
    let secondsLeft = 2;
    function toggleAuto() {
      const btn = document.getElementById("autoBtn");
      const cd = document.getElementById("countdown");
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.classList.remove("active");
        cd.textContent = "";
        return;
      }
      btn.classList.add("active");
      secondsLeft = 2;
      cd.textContent = "Refreshing in " + secondsLeft + "s";
      autoInterval = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          window.location.reload();
        } else {
          cd.textContent = "Refreshing in " + secondsLeft + "s";
        }
      }, 1000);
    }
  </script>
</body>
</html>
